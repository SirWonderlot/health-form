<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Form Submissions</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: linear-gradient(135deg, #4a6274 0%, #5d7a8c 100%);
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { color: #fff; font-size: 1.3rem; font-weight: 600; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .badge {
    background: #e74c3c;
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .badge.zero { background: #6b8a7a; }

  /* Login screen */
  .login-screen {
    max-width: 380px;
    margin: 80px auto;
    background: #fff;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center;
  }
  .login-screen h2 { color: #4a6274; margin-bottom: 20px; }
  .login-screen input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #d0d5dd;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    margin-bottom: 14px;
    outline: none;
  }
  .login-screen input:focus { border-color: #4a6274; }
  .login-screen button {
    width: 100%;
    padding: 12px;
    background: #4a6274;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  .login-screen button:hover { background: #3a5060; }
  .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 8px; display: none; }

  /* Container */
  .container {
    max-width: 1100px;
    margin: 24px auto;
    padding: 0 16px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .toolbar .count { font-size: 0.9rem; color: #666; }
  .btn-sm {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-mark { background: #5a8a6a; color: #fff; }
  .btn-mark:hover { background: #4a7a5a; }
  .btn-refresh { background: #4a6274; color: #fff; }
  .btn-refresh:hover { background: #3a5060; }

  /* Submission cards */
  .submission-card {
    background: #fff;
    border-radius: 10px;
    margin-bottom: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    overflow: hidden;
    border-left: 4px solid #e0e4e8;
    transition: border-color 0.2s;
  }
  .submission-card.unread { border-left-color: #e74c3c; }
  .card-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .card-header:hover { background: #f8f9fb; }
  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card-id { font-weight: 700; color: #4a6274; font-size: 0.95rem; }
  .card-date { font-size: 0.8rem; color: #999; }
  .card-route {
    font-size: 0.8rem;
    color: #666;
    background: #f0f4f8;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .card-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn-delete {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px;
    transition: color 0.2s;
  }
  .btn-delete:hover { color: #e74c3c; }
  .unread-dot {
    width: 10px; height: 10px;
    background: #e74c3c;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid #f0f2f5;
  }
  .card-body.open { display: block; }

  .section-title {
    font-weight: 700;
    color: #4a6274;
    font-size: 0.9rem;
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #eee;
  }
  .answer-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.85rem;
    border-bottom: 1px solid #f8f8f8;
    gap: 12px;
  }
  .answer-row:last-child { border-bottom: none; }
  .answer-q { color: #555; flex: 1; }
  .answer-a { font-weight: 600; flex-shrink: 0; }
  .answer-a.yes { color: #c0392b; }
  .answer-a.no { color: #27ae60; }
  .answer-a.other { color: #4a6274; }

  /* Auto-refresh indicator */
  .auto-refresh {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
  .empty-state h3 { color: #aaa; margin-bottom: 8px; }

  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .header h1 { font-size: 1.1rem; }
    .card-header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .card-body { padding: 0 14px 14px; }
    .answer-row { flex-direction: column; gap: 2px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-screen">
  <h2>Admin Login</h2>
  <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Login</button>
  <p class="login-error" id="loginError">Invalid password</p>
</div>

<!-- Dashboard (hidden until login) -->
<div id="dashboard" style="display:none;">
  <div class="header">
    <h1>Form Submissions</h1>
    <div class="header-right">
      <span class="badge" id="newBadge">0 new</span>
      <span class="auto-refresh">Auto-refreshes every 30s</span>
    </div>
  </div>
  <div class="container">
    <div class="toolbar">
      <span class="count" id="totalCount"></span>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm btn-mark" onclick="markAllViewed()">Mark all read</button>
        <button class="btn-sm btn-refresh" onclick="loadSubmissions()">Refresh</button>
      </div>
    </div>
    <div id="submissionsList"></div>
  </div>
</div>

<script>
  let submissions = [];
  let refreshTimer = null;

  function doLogin() {
    const password = document.getElementById('passwordInput').value;
    fetch('/admin/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    })
      .then(r => {
        if (!r.ok) throw new Error('Unauthorized');
        return r.json();
      })
      .then(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadSubmissions();
        refreshTimer = setInterval(loadSubmissions, 30000);
      })
      .catch(() => {
        document.getElementById('loginError').style.display = 'block';
      });
  }

  function loadSubmissions() {
    fetch('/admin/api/submissions')
      .then(r => {
        if (!r.ok) throw new Error('Unauthorized');
        return r.json();
      })
      .then(data => {
        const prevCount = submissions.length;
        submissions = data;
        renderSubmissions();
        if (data.length > prevCount && prevCount > 0 && Notification.permission === 'granted') {
          new Notification('New Form Submission', {
            body: `${data.length - prevCount} new submission(s) received`
          });
        }
      })
      .catch(() => {
        // Session expired — show login again
        clearInterval(refreshTimer);
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      });
  }

  function renderSubmissions() {
    const list = document.getElementById('submissionsList');
    const newCount = submissions.filter(s => !s.viewed).length;

    document.getElementById('newBadge').textContent = `${newCount} new`;
    document.getElementById('newBadge').className = newCount > 0 ? 'badge' : 'badge zero';
    document.getElementById('totalCount').textContent = `${submissions.length} total submission${submissions.length !== 1 ? 's' : ''}`;

    document.title = newCount > 0 ? `(${newCount}) Admin — Form Submissions` : 'Admin — Form Submissions';

    if (submissions.length === 0) {
      list.innerHTML = '<div class="empty-state"><h3>No submissions yet</h3><p>Submissions will appear here when someone completes the form.</p></div>';
      return;
    }

    list.innerHTML = submissions.map(s => {
      const data = typeof s.data === 'string' ? JSON.parse(s.data) : s.data;
      return `
        <div class="submission-card ${s.viewed ? '' : 'unread'}" id="card-${s.id}">
          <div class="card-header" onclick="toggleCard(${s.id})">
            <div class="card-meta">
              <span class="card-id">Submission #${s.id}</span>
              <span class="card-date">${formatDate(s.submitted_at)}</span>
            </div>
            <div class="card-actions">
              <span class="card-route">${escapeHTML(s.route_taken || 'N/A')}</span>
              ${s.viewed ? '' : '<div class="unread-dot"></div>'}
              <button class="btn-delete" onclick="event.stopPropagation();deleteSubmission(${s.id})" title="Delete">&times;</button>
            </div>
          </div>
          <div class="card-body" id="body-${s.id}">
            ${renderSubmissionData(data)}
          </div>
        </div>`;
    }).join('');
  }

  function renderSubmissionData(data) {
    let html = '';
    const sectionLabels = {
      section1: 'Section 1',
      section2: 'Section 2',
      section3: 'Section 3',
      finalSection: 'Final Section'
    };

    for (const [key, label] of Object.entries(sectionLabels)) {
      if (data[key] && Object.keys(data[key]).length > 0) {
        html += `<div class="section-title">${label}</div>`;
        for (const [q, a] of Object.entries(data[key])) {
          const ansStr = String(a);
          let cls = 'other';
          if (ansStr === 'Yes') cls = 'yes';
          else if (ansStr === 'No') cls = 'no';
          html += `<div class="answer-row"><span class="answer-q">${escapeHTML(q)}</span><span class="answer-a ${cls}">${escapeHTML(ansStr)}</span></div>`;
        }
      }
    }

    if (data.routeTaken) {
      html += `<div class="section-title">Route</div>`;
      html += `<div class="answer-row"><span class="answer-q">Path taken</span><span class="answer-a other">${escapeHTML(data.routeTaken)}</span></div>`;
    }

    return html;
  }

  function toggleCard(id) {
    const body = document.getElementById(`body-${id}`);
    const isOpen = body.classList.toggle('open');

    if (isOpen) {
      const card = document.getElementById(`card-${id}`);
      if (card.classList.contains('unread')) {
        fetch(`/admin/api/mark-viewed/${id}`, { method: 'POST' });
        card.classList.remove('unread');
        const dot = card.querySelector('.unread-dot');
        if (dot) dot.remove();
        const sub = submissions.find(s => s.id === id);
        if (sub) sub.viewed = 1;
        const newCount = submissions.filter(s => !s.viewed).length;
        document.getElementById('newBadge').textContent = `${newCount} new`;
        document.getElementById('newBadge').className = newCount > 0 ? 'badge' : 'badge zero';
        document.title = newCount > 0 ? `(${newCount}) Admin — Form Submissions` : 'Admin — Form Submissions';
      }
    }
  }

  function markAllViewed() {
    fetch('/admin/api/mark-all-viewed', { method: 'POST' })
      .then(() => loadSubmissions());
  }

  function deleteSubmission(id) {
    if (!confirm('Delete this submission?')) return;
    fetch(`/admin/api/submissions/${id}`, { method: 'DELETE' })
      .then(() => loadSubmissions());
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'Z');
    return d.toLocaleString('en-CA', { timeZone: 'America/Toronto', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
</script>
</body>
</html>
